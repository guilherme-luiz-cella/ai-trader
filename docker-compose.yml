services:
  signal-api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      SIGNAL_API_HOST: 0.0.0.0
      SIGNAL_API_PORT: 8765
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8765/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "8765:8765"

  frontend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      VITE_API_BASE_URL: "/api"
      VITE_DEV_API_TARGET: "http://signal-api:8765"
    depends_on:
      signal-api:
        condition: service_healthy
    ports:
      - "3000:3000"
