services:
  signal-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      SIGNAL_API_HOST: 0.0.0.0
      SIGNAL_API_PORT: 8765
    restart: unless-stopped
    ports:
      - "8765:8765"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      VITE_API_BASE_URL: "http://localhost:8765"
    depends_on:
      - signal-api
    restart: unless-stopped
    ports:
      - "3000:3000"
