services:
  signal-api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      SIGNAL_API_HOST: 0.0.0.0
      SIGNAL_API_PORT: 8765
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8765/health', timeout=5).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - runtime_memory:/app/research/runtime_memory
      - model_cache:/root/.cache/huggingface
    expose:
      - "8765"
    networks:
      - app_net

  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    depends_on:
      signal-api:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-}
      API_DOMAIN: ${API_DOMAIN:-api.localhost}
      ACME_EMAIL: ${ACME_EMAIL:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  runtime_memory:
  model_cache:
  caddy_data:
  caddy_config:
